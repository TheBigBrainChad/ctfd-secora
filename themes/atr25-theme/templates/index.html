{% extends "base.html" %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Varela+Round&family=Nunito&family=Kanit:wght@400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --primary-purple: #6B21A8;
        --primary-purple-light: #9333EA;
        --accent-green: #22C55E;
        --accent-red: #EF4444;
        --dark-bg: #0a0a0f;
        --card-bg: #12121a;
    }
    
    body {
        background-color: var(--dark-bg);
        color: #e6edf3;
        font-family: "Kanit", sans-serif;
        overflow-x: hidden;
        min-height: 100vh;
    }
    
    .stars-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
    }
    
    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        animation: twinkle 2s infinite ease-in-out;
    }
    
    @keyframes twinkle {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
    }

    /* SECORA HERO SECTION - Full Width Breakout */
    .secora-hero-container {
        --crew-red: #C51111;
        --crew-green: #50C878;
        --crew-blue: #132ED1;
        --bg-dark: transparent;
        --border-dark: #000000;
        
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background-color: var(--bg-dark);
        width: 100vw;
        position: relative;
        left: 50%;
        right: 50%;
        margin-left: -50vw;
        margin-right: -50vw;
        margin-top: -30px;
        padding: 40px 0;
    }
    
    .secora-hero-background {
        position: absolute;
        inset: 0;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
    }
    
    .secora-floating-crew {
        position: absolute;
        width: var(--size);
        height: auto;
        left: -150px;
        pointer-events: none;
        will-change: transform;
        animation: spaceFloat var(--duration) linear infinite var(--delay);
    }
    
    @keyframes spaceFloat {
        0% {
            transform: translateY(var(--start-y)) rotate(0deg);
        }
        100% {
            left: 110vw;
            transform: translateY(var(--end-y)) rotate(720deg);
        }
    }
    
    .secora-hero-content {
        z-index: 10;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    
    .secora-hero-title {
        font-family: 'Varela Round', 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
        font-size: 5rem;
        color: #FFF;
        text-align: center;
        text-shadow: -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000, 0px 8px 0px rgba(0,0,0,0.5);
        margin-bottom: 20px;
        line-height: 1.1;
    }
    
    .secora-hero-subtitle {
        font-family: 'Varela Round', 'Nunito', sans-serif;
        font-size: 1.5rem;
        color: #e0e6ed;
        max-width: 600px;
        text-align: center;
        margin-bottom: 2rem;
        line-height: 1.6;
        z-index: 2;
        position: relative;
    }
    

    /* Control Panel - Metal Desk Style */
    .secora-control-panel {
        background: #2a2b2e;
        border: 6px solid #000;
        border-radius: 20px;
        padding: 40px;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 15px 0px #1a1c23, 0 20px 20px rgba(0,0,0,0.5);
        max-width: 600px;
        margin: 0 auto;
        position: relative;
    }
    
    .secora-control-panel::before,
    .secora-control-panel::after {
        content: "";
        position: absolute;
        width: 12px;
        height: 12px;
        background: #222;
        border-radius: 50%;
        box-shadow: 0 1px 2px rgba(255,255,255,0.2);
    }
    
    .secora-control-panel::before { top: 10px; left: 10px; }
    .secora-control-panel::after { top: 10px; right: 10px; }
    
    .secora-control-panel .screw-bottom-left,
    .secora-control-panel .screw-bottom-right {
        position: absolute;
        width: 12px;
        height: 12px;
        background: #222;
        border-radius: 50%;
        box-shadow: 0 1px 2px rgba(255,255,255,0.2);
    }
    
    .secora-control-panel .screw-bottom-left { bottom: 10px; left: 10px; }
    .secora-control-panel .screw-bottom-right { bottom: 10px; right: 10px; }

    .secora-hero-actions {
        display: flex;
        gap: 25px;
        flex-wrap: wrap;
        justify-content: center;
    }
/* Mainframe Status Monitor CRT */
    .secora-status-monitor {
        background: #2a2b2e;
        border: 6px solid #000;
        border-radius: 12px;
        padding: 16px;
        display: inline-block;
        margin-bottom: 35px;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 8px 0px #111, 0 12px 15px rgba(0,0,0,0.5);
        position: relative;
        z-index: 15;
    }
    
    .secora-monitor-screen {
        background: #050a07;
        border-radius: 6px;
        padding: 25px 35px;
        border: 3px solid #000;
        box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.15);
        background-image: linear-gradient(rgba(0, 255, 0, 0.03) 50%, transparent 50%);
        background-size: 100% 4px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    
    .secora-monitor-logo {
        width: 140px;
        height: auto;
        margin-bottom: 18px;
        animation: logoPulse 2s infinite alternate ease-in-out;
    }
    
    .secora-monitor-text {
        color: #50C878;
        font-family: 'Share Tech Mono', monospace, sans-serif;
        font-size: 1.3rem;
        text-shadow: 0 0 8px #50C878;
        letter-spacing: 2px;
        animation: textFlicker 5s infinite;
    }
    
    @keyframes logoPulse {
        0% { transform: scale(0.95); filter: drop-shadow(0 0 8px rgba(80, 200, 120, 0.8)); }
        100% { transform: scale(1.05); filter: drop-shadow(0 0 18px rgba(80, 200, 120, 1)); }
    }
    
    @keyframes textFlicker {
        0%, 96%, 98%, 100% { opacity: 1; }
        97%, 99% { opacity: 0.6; text-shadow: none; }
    }
    
    @media (max-width: 768px) {
        .secora-monitor-logo { width: 90px; }
        .secora-monitor-text { font-size: 1rem; }
        .secora-monitor-screen { padding: 15px 20px; }
    }

    .secora-ship-crest {
    width: 180px;
    height: auto;
    margin-bottom: 20px;
    position: relative;
    z-index: 15;
    filter: drop-shadow(0 0 20px rgba(80, 200, 120, 0.8));
    animation: hologramFloat 4s ease-in-out infinite;
}

@keyframes hologramFloat {
    0%, 100% {
        transform: translateY(0px);

    }
    50% {
        transform: translateY(-10px);
        filter: drop-shadow(0 0 30px rgba(138, 43, 226, 0.9));
    }
}

    .secora-btn-login:hover::before {

<div class="stars-bg" id="starsBg"></div>

<section class="secora-hero-container">
    <div class="secora-hero-background">
        <img src="/themes/atr25-theme/static/img/crew-red.png" class="secora-floating-crew" style="--duration: 25s; --delay: 0s; --start-y: 10vh; --end-y: 60vh; --size: 80px; opacity: 0.4;">
        <img src="/themes/atr25-theme/static/img/crew-orange.png" class="secora-floating-crew" style="--duration: 35s; --delay: 5s; --start-y: 80vh; --end-y: 20vh; --size: 50px; opacity: 0.2;">
        <img src="/themes/atr25-theme/static/img/crew-pink.png" class="secora-floating-crew" style="--duration: 28s; --delay: 12s; --start-y: 50vh; --end-y: 90vh; --size: 100px; opacity: 0.6;">
    </div>
    
    <div class="secora-hero-content">
        <div class="secora-status-monitor">
            <div class="secora-monitor-screen">
                <img src="/themes/atr25-theme/static/img/secora-badge.png" class="secora-monitor-logo" alt="Secora OS">
                <div class="secora-monitor-text">&gt; SECORA_OS V1.0 [ACTIVE]</div>
            </div>
        </div>
<h1 class="secora-hero-title">SECORA CTF</h1>
        <p class="secora-hero-subtitle">The Skeld is under attack. Secure the mainframe before the Impostors patch the vulnerabilities.</p>
        
        <div class="secora-control-panel">
            <div class="screw-bottom-left"></div>
            <div class="screw-bottom-right"></div>
            <div class="secora-hero-actions">
            <a href="/register" class="secora-btn secora-btn-join">Join Lobby</a>
            <div class="secora-swipe-container" id="swipeContainer">
            <div class="secora-swipe-screen" id="swipeScreen">PLEASE SWIPE CARD</div>
            <div class="secora-swipe-reader">
                <div class="secora-swipe-track" id="swipeTrack">
                    <img src="/themes/atr25-theme/static/img/secora_id_card.png" class="secora-id-card" id="idCard" draggable="false">
                </div>
            </div>
        </div>
        </div>
        
        <style>
        .secora-swipe-container {
            background: #444;
            border: 6px solid #111;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 12px 0 #111;
            margin: 20px 0;
        }
        .secora-swipe-screen {
            background: #0a150f;
            color: #50C878;
            font-family: monospace;
            font-size: 1.5rem;
            text-align: center;
            padding: 15px;
            border: 4px solid #111;
            border-radius: 8px;
            margin-bottom: 30px;
            text-shadow: 0 0 8px #50C878;
            box-shadow: inset 0 0 15px rgba(0, 255, 0, 0.1);
            background-image: linear-gradient(rgba(0, 255, 0, 0.03) 50%, transparent 50%);
            background-size: 100% 4px;
            text-transform: uppercase;
        }
        .secora-swipe-screen.screen-success {
            color: #00FF00;
            text-shadow: 0 0 15px #00FF00;
            border-color: #00FF00;
        }
        .secora-swipe-screen.screen-failure {
            color: #FF0000;
            text-shadow: 0 0 15px #FF0000;
            border-color: #FF0000;
        }
        .secora-swipe-reader {
            background: #222;
            border: 4px solid #111;
            border-radius: 8px;
            padding: 10px;
        }
        .secora-swipe-track {
            background: #000;
            height: 80px;
            position: relative;
            border-radius: 4px;
            overflow: hidden;
        }
        .secora-id-card {
            position: absolute;
            top: -10px;
            left: 0;
            height: 100px;
            width: auto;
            cursor: grab;
            touch-action: none;
            z-index: 10;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
        }
        .secora-id-card:active {
            cursor: grabbing;
        }
        </style>
        
        <script>
        (function() {
            var idCard = document.getElementById("idCard");
            var swipeTrack = document.getElementById("swipeTrack");
            var swipeScreen = document.getElementById("swipeScreen");
            
            if (!idCard || !swipeTrack || !swipeScreen) return;
            
            var isDragging = false;
            var startX = 0;
            var currentX = 0;
            var maxDrag = swipeTrack.offsetWidth - idCard.offsetWidth;
            
            function getX(e) {
                if (e.touches && e.touches.length > 0) {
                    return e.touches[0].clientX;
                }
                return e.clientX;
            }
            
            function startDrag(e) {
                e.preventDefault();
                isDragging = true;
                startX = getX(e);
                idCard.style.transition = "none";
                idCard.style.cursor = "grabbing";
            }
            
            function onMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                
                var x = getX(e);
                var delta = x - startX;
                currentX = Math.max(0, Math.min(maxDrag, delta));
                idCard.style.transform = "translateX(" + currentX + "px)";
            }
            
            function endDrag() {
                if (!isDragging) return;
                isDragging = false;
                idCard.style.transition = "transform 0.3s ease";
                idCard.style.cursor = "grab";
                
                if (currentX >= maxDrag * 0.85) {
                    // Success
                    idCard.style.transform = "translateX(" + maxDrag + "px)";
                    swipeScreen.innerText = "ACCEPTED";
                    swipeScreen.className = "secora-swipe-screen screen-success";
                    
                    setTimeout(function() {
                        window.location.href = "/login";
                    }, 800);
                } else {
                    // Failure
                    swipeScreen.innerText = "BAD SWIPE. TRY AGAIN.";
                    swipeScreen.className = "secora-swipe-screen screen-failure";
                    currentX = 0;
                    idCard.style.transform = "translateX(0px)";
                    
                    setTimeout(function() {
                        swipeScreen.innerText = "PLEASE SWIPE CARD";
                        swipeScreen.className = "secora-swipe-screen";
                    }, 1200);
                }
            }
            
            idCard.addEventListener("mousedown", startDrag);
            idCard.addEventListener("touchstart", startDrag, { passive: false });
            
            document.addEventListener("mousemove", onMove);
            document.addEventListener("touchmove", onMove, { passive: false });
            
            document.addEventListener("mouseup", endDrag);
            document.addEventListener("touchend", endDrag);
        })();
        </script>
        </div>

            <span class="secora-hud-countdown" id="countdownClock">CALCULATING...</span>

            <div class="secora-hud-taskbar-bg">
                <div class="secora-hud-taskbar-fill" id="taskProgress"></div>
            </div>
        </div>

    <style>
    .secora-hud-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        margin: 20px auto;
        max-width: 600px;
        width: 100%;
        z-index: 10;
        position: relative;
    }
    .secora-hud-sabotage {
        background-color: #0a0a0a;
        border: 4px solid #ff0000;
        border-radius: 10px;
        position: relative;
        overflow: hidden;
        padding: 25px 40px;
        display: flex;
        align-items: center;
        gap: 15px;
        box-shadow: 0 0 25px rgba(255, 0, 0, 0.4), inset 0 0 20px rgba(255, 0, 0, 0.2);
    }
    
    .secora-hud-sabotage::before,
    .secora-hud-sabotage::after {
        content: '';
        position: absolute;
        left: 0;
        width: 100%;
        height: 8px;
        z-index: 1;
    }
    
    .secora-hud-sabotage::before {
        top: 0;
        background: repeating-linear-gradient(45deg, #000, #000 10px, #ff0000 10px, #ff0000 20px);
    }
    
    .secora-hud-sabotage::after {
        bottom: 0;
        background: repeating-linear-gradient(45deg, #000, #000 10px, #ff0000 10px, #ff0000 20px);
    }
    @keyframes textGlitch {
        0%, 96% { transform: translate(0); opacity: 1; text-shadow: 0 0 10px #ff0000; }
        97% { transform: translate(-2px, 2px); opacity: 0.8; text-shadow: -2px 0 blue, 2px 0 red; }
        98% { transform: translate(2px, -2px); opacity: 0.9; text-shadow: none; }
        99% { transform: translate(0); opacity: 0.5; }
        100% { transform: translate(0); opacity: 1; text-shadow: 0 0 10px #ff0000; }
    }
    
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    
    @keyframes flashAlert {
        0%, 100% { background: rgba(255, 0, 0, 0.15); box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        50% { background: rgba(255, 0, 0, 0.4); box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }
    }
    .secora-hud-warning {
        color: #ff0000;
        font-weight: bold;
        font-size: 1.2rem;
        animation: textGlitch 4s infinite linear;
    }
    
    .secora-hud-warning span {
        display: inline-block;
        animation: spin 3s linear infinite;
    }
    .secora-hud-countdown {
        font-family: 'Share Tech Mono', monospace;
        color: #ff3333;
        font-size: 2.5rem;
        font-weight: bold;
        text-shadow: 0 0 5px #ff0000, 0 0 15px #ff0000, 0 0 30px #8b0000;
        letter-spacing: 2px;
        animation: textGlitch 4s infinite linear;
    }
    .secora-hud-taskbar-wrapper {
        width: 100%;
        max-width: 600px;
    }
    .secora-hud-taskbar-text {
        color: #50C878;
        font-family: 'Courier New', monospace;
        font-size: 1.1rem;
        margin-bottom: 5px;
        text-shadow: 0 0 8px #50C878;
            box-shadow: inset 0 0 15px rgba(0, 255, 0, 0.1);
            background-image: linear-gradient(rgba(0, 255, 0, 0.03) 50%, transparent 50%);
            background-size: 100% 4px;
    }
    .secora-hud-taskbar-bg {
        background: #333;
        border: 4px solid #000;
        height: 35px;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: inset 0 0 10px #000;
    }
    .secora-hud-taskbar-fill {
        background: #50C878;
        height: 100%;
        width: 15%;
        transition: width 1s ease-in-out;
        border-right: 3px solid #000;
    }
    </style>
    
    <script>
    (function() {
        var taskStats = document.getElementById('taskStats');
        var taskProgress = document.getElementById('taskProgress');
        var countdownClock = document.getElementById('countdownClock');
        
        function fetchStats() {
            var teams = 'CLASSIFIED';
            var challenges = 0;
            
            fetch('/api/v1/statistics/teams')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    teams = d?.data?.length || d?.data?.total || 'CLASSIFIED';
                    updateStats();
                })
                .catch(function() {
                    teams = 'CLASSIFIED';
                    updateStats();
                });
                
            fetch('/api/v1/challenges')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    challenges = d?.data?.length || 0;
                    updateStats();
                })
                .catch(function() {
                    challenges = 0;
                    updateStats();
                });
                
            function updateStats() {
                if (taskStats) {
                    taskStats.innerText = 'CREWMATES ABOARD: ' + teams + ' | VULNERABILITIES: ' + challenges;
                }
                if (taskProgress && challenges > 0) {
                    var fillPercent = Math.min(challenges * 15, 100);
                    taskProgress.style.width = fillPercent + '%';
                }
            }
        }
        
        function fetchEndTime() {
            fetch('/api/v1/configs')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    var endTime = 1777590000 * 1000;
                    if (d.data) {
                        d.data.forEach(function(item) {
                            if (item.key === 'ctf_end') {
                                endTime = parseInt(item.value) * 1000;
                            }
                        });
                    }
                    if (!endTime && window.init && window.init.ctf_end) {
                        endTime = window.init.ctf_end * 1000;
                    }
                    
                    if (endTime) {
                        var interval = setInterval(function() {
                            var now = new Date().getTime();
                            var distance = endTime - now;
                            
                            if (distance < 0) {
                                clearInterval(interval);
                                if (countdownClock) {
                                    countdownClock.innerText = 'CRITICAL FAILURE - SECORA BREACHED';
                                }
                                return;
                            }
                            
                            var days = Math.floor(distance / (1000 * 60 * 60 * 24));
                            var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                            var seconds = Math.floor((distance % (1000 * 60)) / 1000);
                            
                            var display = '';
                            if (days > 0) display += days + 'D ';
                            display += hours.toString().padStart(2, '0') + ':';
                            display += minutes.toString().padStart(2, '0') + ':';
                            display += seconds.toString().padStart(2, '0');
                            
                            if (countdownClock) {
                                countdownClock.innerText = display;
                            }
                        }, 1000);
                    } else {
                        if (countdownClock) {
                            countdownClock.innerText = 'AWAITING CLEARANCE';
                        }
                    }
                })
                .catch(function() {
                    if (countdownClock) {
                        countdownClock.innerText = 'AWAITING CLEARANCE';
                    }
                });
        }
        
        fetchStats();
        fetchEndTime();
    })();
    </script>
